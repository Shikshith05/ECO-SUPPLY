# EcoRoute Configuration File

# Vehicle Parameters
vehicle:
  avg_speed_kmh: 40        # Average delivery vehicle speed
  fuel_efficiency_l_per_km: 0.12  # Liters per kilometer
  co2_per_liter: 2.31      # kg CO2 per liter of fuel

# Traffic & Delay Parameters
traffic:
  peak_hours:
    - [7, 9]      # Morning rush (7-9 AM)
    - [17, 19]    # Evening rush (5-7 PM)
  delay_buffer_minutes: 15  # Default delay buffer
  congestion_factor: 1.5    # Speed reduction during peak hours

# Optimization Settings
optimization:
  max_iterations: 1000      # For genetic algorithm
  population_size: 50       # GA population size
  mutation_rate: 0.1        # GA mutation rate
  crossover_rate: 0.8       # GA crossover rate
  random_seed: 42           # For reproducibility

cost_function:
  weights:
    distance: 0.25
    fuel: 0.25
    co2: 0.30
    delay: 0.20

  bounds:
    distance: [5, 30]      # km
    fuel: [0.3, 4.0]       # liters
    co2: [0.8, 10.0]       # kg
    delay: [0, 45]         # minutes
